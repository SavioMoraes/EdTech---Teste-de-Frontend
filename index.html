<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Teste técnico de desenvolvimento de página web">
    <title>Frontend Test EdTech</title>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-layout">

    <header class="page-header" aria-label="Cabeçalho da página">
      <div class="page-header__container">
        <!-- CAMADAS DECORATIVAS -->
        <div class="page-header__bg-grid"></div>
        <div class="page-header__bg-blur-left"></div>
        <div class="page-header__bg-blur-right"></div>

        <div class="page-header__svg" aria-hidden="true">
          <svg
            class="page-header__svg-graphic"
            width="1280"
            height="744"
            viewBox="0 0 1280 744"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g clip-path="url(#page-header-svg-clip)">
              <path
                d="M0 161.55C256 107.7 469.333 188.475 640 403.875C810.667 619.275 1024 700.05 1280 646.2"
                stroke="#76B900"
                stroke-width="2.08775"
              />
              <path
                d="M0 403.875C341.333 350.025 597.333 376.95 768 484.65C938.667 592.35 1109.33 511.575 1280 242.325"
                stroke="#76B900"
                stroke-width="1.04387"
              />
              <path
                opacity="0.5"
                d="M1280 80.775C1024 242.325 725.333 376.95 384 484.65C42.6667 592.35 -85.3333 673.125 0 726.975"
                stroke="#76B900"
                stroke-width="1.56581"
              />
            </g>
            <defs>
              <clipPath id="page-header-svg-clip">
                <rect width="1280" height="807.75" fill="white" />
              </clipPath>
            </defs>
          </svg>
        </div>

        <span class="page-header__circle page-header__circle--top-right"></span>
        <span class="page-header__circle page-header__circle--top-left-1"></span>
        <span class="page-header__circle page-header__circle--top-left-2"></span>
        <span class="page-header__circle page-header__circle--bottom"></span>

        <!-- CONTAINER INTERNO -->
        <div class="page-header__inner">
          <div class="page-header__content">
            <!-- BLOCO ESQUERDO -->
            <div class="page-header__content-left">
              <span class="page-header__accent-line"></span>

              <div class="page-header__heading-wrap">
                <h1 class="page-header__title">
                  Lorem ipsum dolor, sit <span>amet</span>
                </h1>
              </div>

              <div class="page-header__description-wrap">
                <p class="page-header__description">
                  It is a long established fact that a reader will be distracted by
                  the readable content of a page when looking at its layout.
                </p>
              </div>

              <div class="page-header__actions">
                <button class="page-header__button" type="button">
                  <span class="page-header__button-text">Lorem Ipsum</span>
                  <span class="page-header__button-icon">→</span>
                </button>
              </div>
            </div>

            <!-- BLOCO DIREITO -->
            <div class="page-header__content-right">
              <div class="page-header__card">
                <div class="page-header__card-top">
                  <div class="page-header__card-dots">
                    <span class="page-header__dot page-header__dot--red"></span>
                    <span class="page-header__dot page-header__dot--yellow"></span>
                    <span class="page-header__dot page-header__dot--green"></span>
                  </div>

                  <span class="page-header__card-top-line"></span>
                </div>

                <div class="page-header__card-body">
                  <div class="page-header__sidebar">
                    <span class="page-header__sidebar-line page-header__sidebar-line--1"></span>
                    <span class="page-header__sidebar-line page-header__sidebar-line--2"></span>

                    <div class="page-header__sidebar-footer">
                      <span class="page-header__sidebar-highlight"></span>
                    </div>
                  </div>

                  <div class="page-header__main-panels">
                    <div class="page-header__chart"></div>

                    <div class="page-header__panels-row">
                      <div class="page-header__panel"></div>
                      <div class="page-header__panel"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="page-main__container">
        <section class="section section-video">
          <h2>Vídeo</h2>
        </section>
  
        <section class="section section-side-image">
          <h2>Imagem lateral</h2>
        </section>
  
        <section class="section section-slider">
          <h2>Slider</h2>
        </section>
  
        <section class="section section-highlight">
          <h2>Destaque</h2>
        </section>
  
        <section class="section section-cards">
          <h2>Cards</h2>
        </section>
  
        <section class="section section-text">
          <h2>Texto</h2>
        </section>
  
        <section class="section section-podcast">
          <h2>Podcast</h2>
        </section>
  
        <section class="section section-discursive-activity">
          <h2>Atividade discursiva</h2>
        </section>
  
        <section class="section section-objective-activity">
          <h2>Atividade Objetiva</h2>
        </section>
  
        <section class="section section-accordion">
          <h2>Perguntas frequentes</h2>
        </section>
      </div>
    </main>

    <footer class="page-footer">
      <div class="page-footer__container">

      </div>
    </footer>
  </div>
    <script src="assets/js/main.js"></script>
</body>
</html>
